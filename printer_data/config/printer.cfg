[include mainsail.cfg]
[include macros.cfg]
[include timelapse.cfg]
[include motor_database.cfg]

# --- TMC AUTOTUNE MOTOR DATABASE (Necessary for Shengyang support) ---
[motor_constants sv08-xy]
resistance: 1.0
inductance: 0.002
holding_torque: 0.42
max_current: 1.5
steps_per_revolution: 200

[motor_constants sv08-z]
resistance: 6.0
inductance: 0.0087
holding_torque: 0.28
max_current: 0.8
steps_per_revolution: 200

[motor_constants sv08-extruder]
resistance: 1.8
inductance: 0.0012
holding_torque: 0.135
max_current: 1.5
steps_per_revolution: 200


# Configuration for the stock SV08 probe. You should not generally have
# to edit anything here.

[probe]
pin: extra_mcu:PB6
x_offset: -17
y_offset: 10
# You can find the z_offset option in the printer.cfg
# z_offset : 0
speed: 5.0
samples: 2
sample_retract_dist: 1.0
lift_speed: 50
samples_result: average
samples_tolerance: 0.016
samples_tolerance_retries: 2

#[z_offset_calibration]
#center_xy_position:191,165
#endstop_xy_position:289,361
#z_hop: 10
#z_hop_speed: 15

[homing_override]
gcode:
  # Move 5 up, just in case (this is our safety zhop, this needs 'set_position_z: 0' below)
  G91 ; set relative positioning
  G0 Z5 F1500 ; 5 up zhop
  {% if not rawparams or 'Y' in rawparams %}
    {action_respond_info('Homing Y')}
    G28 Y
    G90 ; set absolute positioning
    G0 Y177.5 F10000 ; return to center
    M400 ; Wait for move to finish
  {% endif %}
  {% if not rawparams or 'X' in rawparams %}
    {action_respond_info('Homing X')}
    G28 X
    G90 ; set absolute positioning
    G0 X177.5 F10000 ; return to center
    M400 ; Wait for move to finish
  {% endif %}
  {% if not rawparams or 'Z' in rawparams %}
    {action_respond_info('Homing Z')}
    G90 ; set absolute positioning
    G0 X177.5 Y177.5 F10000 ; return to center, please add your offsets manually if you want to
    G28 Z
    G0 Z5 F1500 ; move to z5 to finish
    M400 ; Wait for move to finish
  {% endif %}
  G90 ; set absolute positioning
axes: xyz
set_position_z: 0 # This forces the z position to be at 0 when we start homing, so we can move the Z up before homing.

[bed_mesh]
speed: 500
horizontal_move_z: 3
mesh_min: 10,10
mesh_max: 333,340
probe_count: 9,9
algorithm: bicubic
bicubic_tension: 0.4
split_delta_z: 0.016
mesh_pps:3,3
adaptive_margin: 5
fade_start: 0
fade_end: 10
fade_target: 0


# --- TMC AUTOTUNE CONFIGURATION ---
[autotune_tmc stepper_x]
motor: sv08-xy
tuning_goal: performance
sg4_thrs: 135
voltage: 24

[autotune_tmc stepper_y]
motor: sv08-xy
tuning_goal: performance
sg4_thrs: 130
voltage: 24

[autotune_tmc stepper_z]
motor: sv08-z
tuning_goal: silent
voltage: 24

[autotune_tmc stepper_z1]
motor: sv08-z
tuning_goal: silent
voltage: 24

[autotune_tmc stepper_z2]
motor: sv08-z
tuning_goal: silent
voltage: 24

[autotune_tmc stepper_z3]
motor: sv08-z
tuning_goal: silent
voltage: 24

[autotune_tmc extruder]
motor: sv08-extruder
tuning_goal: silent
voltage: 24

# PLEASE UNCOMMENT THE FILE THAT BEST FITS YOUR CONFIGURATION
[include options/lcd/*.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_36FFDA05334D413241800551-if00
restart_method: command     

[mcu extra_mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_57FF6D064888875450251667-if00
restart_method: command      

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy           
max_velocity: 600            
max_accel: 40000             
minimum_cruise_ratio: 0.5
max_z_velocity: 50           
max_z_accel: 50             
square_corner_velocity: 5.0

[stepper_x]
step_pin: PE2
dir_pin: !PE0
enable_pin: !PE3
rotation_distance: 40         
microsteps: 32                
full_steps_per_rotation: 200   
endstop_pin: tmc2209_stepper_x: virtual_endstop              
position_min: 0                
position_endstop: 355         
position_max: 355             
homing_speed: 130           
homing_retract_dist: 0        
homing_positive_dir: True     

[tmc2209 stepper_x]
uart_pin: PE1
interpolate: True             
run_current: 1.1             
sense_resistor: 0.150         
uart_address: 3
diag_pin: PE15

[stepper_y]
step_pin: PB8
dir_pin: !PB6
enable_pin: !PB9
rotation_distance: 40         
microsteps: 32                
full_steps_per_rotation: 200   
endstop_pin: tmc2209_stepper_y: virtual_endstop              
position_min: 0                
position_endstop: 364         
position_max: 364            
homing_speed: 130             
homing_retract_dist: 0        
homing_positive_dir: true     

[tmc2209 stepper_y]
uart_pin: PB7
interpolate: True             
run_current: 1.1             
sense_resistor: 0.150         
uart_address: 3
diag_pin: PE13 

[stepper_z] #motherboard：Z3 
step_pin: PC0    
dir_pin: PE5    
enable_pin: !PC1    
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 32               
endstop_pin: probe:z_virtual_endstop           
position_max: 347             
position_min: -5              
homing_speed: 25.0
homing_retract_dist: 1.0
homing_retract_speed: 25.0
second_homing_speed: 10.0

[tmc2209 stepper_z]
uart_pin: PE6 
interpolate: True             
run_current: 0.55           
sense_resistor: 0.150         
uart_address: 3

[stepper_z1] ##motherboard：Z1
step_pin: PD3  
dir_pin: !PD1 
enable_pin: !PD4 
rotation_distance: 40         
gear_ratio: 80:12            
microsteps: 32               

[tmc2209 stepper_z1]
uart_pin: PD2  
interpolate: True             
run_current: 0.55          
sense_resistor: 0.150         
uart_address: 3

[stepper_z2] ##motherboard：Z2
step_pin: PD7
dir_pin: PD5   
enable_pin: !PB5
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 32                

[tmc2209 stepper_z2]
uart_pin: PD6  
interpolate: True             
run_current: 0.55            
sense_resistor: 0.150         
uart_address: 3

[stepper_z3] ##motherboard：Z4
step_pin: PD11 
dir_pin: !PD9 
enable_pin: !PD12   
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 32                

[tmc2209 stepper_z3]
uart_pin: PD10    
interpolate: True            
run_current: 0.55         
sense_resistor: 0.150         
uart_address: 3

[thermistor my_thermistor_e]
temperature1: 25
resistance1: 110000
temperature2: 100
resistance2: 7008
temperature3: 220
resistance3: 435

[extruder]
step_pin: extra_mcu:PA8   
dir_pin: extra_mcu:PB8    
enable_pin: !extra_mcu:PB11   
rotation_distance: 6.5 
microsteps: 32                
full_steps_per_rotation: 200 
nozzle_diameter: 0.400        
filament_diameter: 1.75  
max_extrude_only_distance: 150     
heater_pin: extra_mcu:PB9  
sensor_type: my_thermistor_e  
pullup_resistor: 11500
sensor_pin: extra_mcu:PA5  
min_temp: 5                  
max_temp: 550                
max_power: 1.0                
min_extrude_temp: 5
#control: mpc
heater_power: 80.0       # Your 80W heater rating
cooling_fan: fan        # Name of your part cooling fan (usually 'fan')
filament_diameter: 1.75
filament_density: 1.25   # Typical for PLA; MPC uses this for flow compensation
filament_heat_capacity: 1.8 # Typical for PLA
# The following values will be added/updated by the calibration
# block_heat_capacity: 
# sensor_responsiveness: 
# ambient_transfer: 
# fan_ambient_transfer:
pressure_advance: 0.025       
pressure_advance_smooth_time: 0.035    

[tmc2209 extruder]
uart_pin: extra_mcu:PB10  
interpolate: True             
run_current: 0.8           
uart_address: 3
sense_resistor: 0.150          

[verify_heater extruder]      
max_error: 120                
check_gain_time: 30           
hysteresis: 5                 
heating_gain: 2               

[filament_switch_sensor filament_sensor]
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.5
switch_pin: PE9

[thermistor my_thermistor]
temperature1: 25
resistance1: 100000
temperature2: 50
resistance2: 18085.4
temperature3: 100
resistance3: 5362.6

[heater_bed]
heater_pin: PA0
sensor_type: my_thermistor  
sensor_pin: PC5
max_power: 1.0               
min_temp: 5                  
max_temp: 190                
control: pid
pid_kp: 73.571
pid_ki: 1.820
pid_kd: 783.849

[verify_heater heater_bed]      
max_error: 120                
check_gain_time: 40           
hysteresis: 5                 
heating_gain: 2   

[quad_gantry_level]          
gantry_corners:              
	-60,-10
	410,420
points:
	36,10
	36,320
	346,320
	346,10
speed: 500                    
horizontal_move_z: 6        
retry_tolerance: 0.005 
retries: 5                  
max_adjust: 30   

[multi_pin print_cooling_fan_pins]
pins: extra_mcu:PA7, extra_mcu:PB1

[fan]
pin: multi_pin:print_cooling_fan_pins
max_power: 1.0

[controller_fan MCU_fan]
pin: PA2
max_power: 1
kick_start_time: 0.5
fan_speed: 1
idle_timeout: 300
heater: extruder, heater_bed
stepper: stepper_x, stepper_y

[output_pin heater_ssr]
pin: PA1
pwm: True
cycle_time: 0.250 
value: 0
shutdown_value: 0

[fan_generic heater_cooling_fan]
pin: PA6
max_power: 1.0

[heater_fan hotend_fan]      
pin: extra_mcu:PA6   
max_power: 1.0               
kick_start_time: 0.5         
heater: extruder             
heater_temp: 50              
tachometer_pin: extra_mcu:PA1
tachometer_ppr: 1
tachometer_poll_interval: 0.0013

[gcode_arcs]                        
resolution: 1.0                     

[led main_led]
white_pin: PA3
cycle_time: 0.010
hardware_pwm: False
initial_WHITE: 1.0

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 600

[temperature_sensor mcu_temp]         
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Host_temp]     
sensor_type: temperature_host
min_temp: 0
max_temp: 110

[temperature_sensor Toolhead_Temp]
sensor_type: temperature_mcu
sensor_mcu: extra_mcu

[pause_resume]
[exclude_object]

[adxl345]
cs_pin: extra_mcu:PB12

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 30  
accel_per_hz: 50
min_freq: 1
max_freq: 100
max_smoothing: 0.2
hz_per_sec: 0.5

[input_shaper]
damping_ratio_x: 0.001
damping_ratio_y: 0.001
shaper_type_x = mzv
shaper_freq_x = 35
shaper_type_y = mzv
shaper_freq_y = 35

[save_variables]
filename = ~/printer_data/config/saved_variables.cfg

