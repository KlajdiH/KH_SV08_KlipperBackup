[gcode_macro TUNE_HEATERS]
description: Tune Bed (PID), Extruder (MPC/PID), or Chamber (PID). Use TEMP=0 to skip.
gcode:
    {% set E_TEMP = params.EXTRUDER|default(0)|float %}
    {% set B_TEMP = params.BED|default(0)|float %}
    {% set C_TEMP = params.CHAMBER|default(0)|float %}

    # 1. Safety & Positioning
    {% if E_TEMP <= 0 and B_TEMP <= 0 and C_TEMP <= 0 %}
        {action_respond_info("Usage: TUNE_HEATERS EXTRUDER=210 BED=60 CHAMBER=50")}
    {% else %}
        {% if printer.toolhead.homed_axes|lower != "xyz" %}
            G28
        {% endif %}
        # Move to center for accurate thermal environment
        G1 Z50 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000

        # 2. Tune Bed (Always PID)
        {% if B_TEMP > 0 %}
            {action_respond_info("PID: Tuning Bed to %.1fC..." % B_TEMP)}
            PID_CALIBRATE HEATER=heater_bed TARGET={B_TEMP}
        {% endif %}

        # 3. Tune Chamber (Generic Heater)
        {% if C_TEMP > 0 %}
            {action_respond_info("PID: Tuning Chamber Heater to %.1fC..." % C_TEMP)}
            PID_CALIBRATE HEATER=chamber_heater TARGET={C_TEMP}
        {% endif %}

        # 4. Tune Extruder (Detects MPC or PID)
        {% if E_TEMP > 0 %}
            M106 S64 # Turn on part cooling fan to 25% to simulate real printing
            {% if printer.configfile.settings.extruder.control == 'mpc' %}
                {action_respond_info("MPC: Calibrating 80W Extruder to %.1fC..." % E_TEMP)}
                MPC_CALIBRATE HEATER=extruder TARGET={E_TEMP}
            {% else %}
                {action_respond_info("PID: Calibrating Extruder to %.1fC..." % E_TEMP)}
                PID_CALIBRATE HEATER=extruder TARGET={E_TEMP}
            {% endif %}
            M107 # Fan off
        {% endif %}

        # 5. Save and Restart
        {action_respond_info("Tuning complete. Saving and restarting...")}
        SAVE_CONFIG
    {% endif %}


    
    
    
    
    



    
#####################################################################
#   A better print_start macro for v2/trident
#####################################################################
[gcode_macro PRINT_START]
gcode:
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set target_chamber_minimal = params.CHAMBER_MINIMAL|default("0")|int %}
  {% set target_chamber_wait = [target_chamber, target_chamber_minimal]|select(">", 0)|min|default(0) %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  ##  Uncomment for Beacon Contact (1 of 4 for beacon contact)
  #SET_GCODE_OFFSET Z=0                                 # Set offset to 0

  # Clear any lingering pause states
  CLEAR_PAUSE

  # Home the printer, set absolute positioning and update the Stealthburner LEDs.
  STATUS_HOMING                                         # Set LEDs to homing-mode
  G28                                                   # Full home (XYZ)
  G90                                                   # Absolute position

  ##  Uncomment for bed mesh (1 of 2 for bed mesh)
  BED_MESH_CLEAR                                       # Clear old saved bed mesh (if any)

  # Check if the bed temp is higher than 90c - if so then trigger a heatsoak.
  {% if params.BED|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    STATUS_HEATING                                      # Set LEDs to heating-mode
    M106 S255                                           # Turn on the PT-fan

    ##  Uncomment if you have a Nevermore.
    #SET_PIN PIN=nevermore VALUE=1                      # Turn on the nevermore

    G1 X{x_wait} Y{y_wait} Z15 F9000                    # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber_wait}c"  # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber_wait}   # Waits for chamber temp

  # If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp with a 5 min soak
  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    STATUS_HEATING                                      # Set LEDs to heating-mode
    G1 X{x_wait} Y{y_wait} Z15 F9000                    # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
    SET_DISPLAY_TEXT MSG="Soak for 5 min"               # Display info on display
    G4 P300000                                          # Wait 5 min for the bedtemp to stabilize
  {% endif %}

  # Heat hotend to 150c. This helps with getting a correct Z-home.
  SET_DISPLAY_TEXT MSG="Hotend: 150c"                   # Display info on display
  M109 S150                                             # Heat hotend to 150c

  ##  Uncomment for Beacon contact (2 of 4 for beacon contact)
  #G28 Z METHOD=CONTACT CALIBRATE=1                     # Calibrate z offset and beacon model

  ##  Uncomment for Trident (Z_TILT_ADJUST)
  #SET_DISPLAY_TEXT MSG="Leveling"                      # Display info on display
  #STATUS_LEVELING                                      # Set LEDs to leveling-mode
  #Z_TILT_ADJUST                                        # Level the printer via Z_TILT_ADJUST
  #G28 Z                                                # Home Z again after Z_TILT_ADJUST

  ##  Uncomment for V2.4 (Quad gantry level AKA QGL)
  SET_DISPLAY_TEXT MSG="Leveling"                      # Display info on display
  STATUS_LEVELING                                      # Set LEDs to leveling-mode
  QUAD_GANTRY_LEVEL                                    # Level the printer via QGL
  G28 Z                                                # Home Z again after QGL

  ##  Uncomment for bed mesh (2 of 2 for bed mesh)
  SET_DISPLAY_TEXT MSG="Bed mesh"                      # Display info on display
  STATUS_MESHING                                       # Set LEDs to bed mesh-mode
  BED_MESH_CALIBRATE                                   # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh

  ## Uncomment for Beacon Contact (3 of 4 for beacon contact)
  #G28 Z METHOD=CONTACT CALIBRATE=0                     # Calibrate z offset only with hot nozzle

  # Heat up the hotend up to target via data from slicer
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"     # Display info on display
  STATUS_HEATING                                        # Set LEDs to heating-mode
  G1 X{x_wait} Y{y_wait} Z15 F9000                      # Go to center of the bed
  M107                                                  # Turn off partcooling fan
  M109 S{target_extruder}                               # Heat the hotend to set temp

  ##   Uncomment for Beacon Contact (4 of 4 for beacon contact)
  #SET_GCODE_OFFSET Z=0.06                              # Add a little offset for hotend thermal expansion

  # Get ready to print by doing a primeline and updating the LEDs
  SET_DISPLAY_TEXT MSG="Printer goes brr"               # Display info on display
  STATUS_PRINTING                                       # Set LEDs to printing-mode
  G0 X{x_wait - 50} Y4 F10000                           # Go to starting point
  G0 Z0.4                                               # Raise Z to 0.4
  G91                                                   # Incremental positioning 
  G1 X100 E20 F1000                                     # Primeline
  G90                                                   # Absolute position

    

[gcode_macro END_PRINT]
description: Safely end the print and reset states
variable_state: 'normal'
gcode:
    # 1. Prepare Environment
    {% set z_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance|int %}
    {% set e_mintemp = printer.configfile.settings['extruder'].min_extrude_temp %}

    M400                          ; Wait for moves to finish
    
    # 2. Reset Start Print State
    # Only reset 'state'. Do not call 'record_extruder_temp' unless defined in START_PRINT.
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Prepare"'

    M117 Done
    G91                           ; Relative positioning

    # 3. Retract Filament safely
    {% if printer['filament_switch_sensor filament_sensor'].enable == True and
          printer['filament_switch_sensor filament_sensor'].filament_detected == True %}
        {% if printer.extruder.temperature >= e_mintemp %}
            G1 E-2 F2700          ; Retract filament
            G1 E-2 Z0.2 F2400     ; Retract and lift slightly
        {% endif %}
    {% endif %}

    # 4. Lift Toolhead to prevent bed melting
    {% if (printer.gcode_move.position.z + 25) < z_max %}
        G1 Z+25 F3000
    {% else %}
        G1 Z+{(z_max - printer.gcode_move.position.z)} F3000
    {% endif %}

    # 5. Park and Cool Down
    G90                           ; Absolute positioning
    G1 X0 Y360 F9000              ; Present the print
    
    _ALL_FAN_OFF                  ; Custom fan macro
    TURN_OFF_HEATERS              ; Turn off nozzle and bed
    M107                          ; Turn off part cooling fan

    # 6. Disable Steppers (Wait for moves to finish first)
    M84 X Y Z E                   

    # 7. Reset Speed/Extrusion Overrides
    M220 S100
    M221 S100

    CLEAR_PAUSE
    {action_respond_info("Finish Print!")}


#####################################################################
#  A matching print_end macro for v2/trident
#####################################################################

[gcode_macro PRINT_END]
variable_cool_time: 0
variable_target_bed: 35

gcode:
    # --- 1. FETCH DATA ---
    {% set cool_time = printer["gcode_macro PRINT_END"].cool_time|int %}
    {% set target_bed = printer["gcode_macro PRINT_END"].target_bed|int %}
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set current_z = printer.toolhead.position.z|float %}
    
    # --- 2. SMART Z-LIFT CALCULATION ---
    {% if current_z < (z_max - 20.0) %}
        {% set z_lift = 20.0 %}
    {% else %}
        {% set z_lift = z_max - current_z %}
    {% endif %}

    # --- 3. RETRACT AND PARK ---
    M400                           ; Wait for moves to finish
    G92 E0                         ; Zero extruder
    G1 E-2.0 F3600                 ; Retract 2mm
    G91                            ; Relative positioning
    G1 Z{z_lift} F3000             ; Safe Z-lift
    G90                            ; Absolute positioning
    G1 X{x_park} Y{y_park} F9000   ; Park at back corner

    # --- 4. SHUTDOWN HOTEND ---
    M104 S0                        ; Kill hotend immediately
    M107                           ; Turn off part cooling fan
    
    # --- 5. ANNEALING LOGIC ---
    {% if cool_time > 0 %}
        SET_DISPLAY_TEXT MSG="Equilizing: 30m"
        G4 P1800000                ; 30-minute static soak
        
        SET_DISPLAY_TEXT MSG="PPA Anneal: {cool_time}m"
        _COOL_DOWN_STEP TARGET={target_bed} DURATION={cool_time}
    {% else %}
        TURN_OFF_HEATERS           
        M84                        ; Disable motors
        STATUS_OFF                 ; LEDs off
        SET_DISPLAY_TEXT MSG="Print Done"
    {% endif %}

    # Reset variables for next print
    SET_GCODE_VARIABLE MACRO=PRINT_END VARIABLE=cool_time VALUE=0


[gcode_macro _COOL_DOWN_STEP]
gcode:
    {% set target = params.TARGET|float %}
    {% set duration = params.DURATION|float %}
    {% set current_bed = printer.heater_bed.target|float %}
    
    {% set drop_per_step = (current_bed - target) / duration %}
    {% set next_temp = current_bed - drop_per_step %}

    {% if current_bed > target and duration > 0 %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={next_temp}
        SET_DISPLAY_TEXT MSG="PPA Bed: {next_temp|int}C ({duration|int}m left)"
        G4 P60000                  ; Wait 60 seconds
        _COOL_DOWN_STEP TARGET={target} DURATION={duration - 1}
    {% else %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
        M84
        STATUS_OFF
        SET_DISPLAY_TEXT MSG="PPA Done"
    {% endif %}
    

