[gcode_macro AUTO_RESONANCE_TUNE]
description: Automatically run Input Shaper calibration for X and Y
gcode:
    {% if printer.toolhead.homed_axes|lower != "xyz" %}
        G28
    {% endif %}
    M117 Tuning X resonance...
    SHAPER_CALIBRATE AXIS=X
